apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: portal
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: portal
type: Opaque
stringData:
  JWT_SECRET: my-super-secret-key-that-is-at-least-256-bits-long!!
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: portal
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    for db in identity_service_db candidate_service_db employer_service_db job_service_db; do
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
        CREATE DATABASE $db;
    EOSQL
    done
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: portal
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-script
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: portal
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
  clusterIP: None
